<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>아크릴 주문 수량 계산기 (쇼핑몰 연동용)</title>
    <style>
        .acrylic-calculator-container {
            max-width: 480px;
            margin: 30px auto;
            padding: 30px;
            border: 1px solid #e2e8f0;
            border-radius: 16px;
            font-family: 'Malgun Gothic', dotum, sans-serif;
            background-color: #ffffff;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }
        .acrylic-calculator-container h3 {
            margin-top: 0;
            margin-bottom: 8px;
            font-size: 22px;
            color: #1e293b;
            text-align: center;
            font-weight: bold;
        }
        .sub-title {
            text-align: center;
            font-size: 13px;
            color: #64748b;
            margin-bottom: 25px;
        }
        .calc-row {
            margin-bottom: 18px;
        }
        .calc-row label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #475569;
            font-weight: 600;
        }
        .input-box-wrapper {
            display: flex;
            align-items: center;
            position: relative;
        }
        .input-box-wrapper input, .input-box-wrapper select {
            width: 100%;
            padding: 12px 45px 12px 14px;
            border: 1.5px solid #cbd5e1;
            border-radius: 8px;
            font-size: 16px;
            color: #334155;
            outline: none;
            box-sizing: border-box;
            transition: all 0.2s ease;
        }
        .input-box-wrapper select {
            padding-right: 14px;
        }
        .input-box-wrapper input:focus, .input-box-wrapper select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }
        .unit-text {
            position: absolute;
            right: 15px;
            font-size: 14px;
            color: #94a3b8;
            pointer-events: none;
        }
        .guide-text {
            margin-top: 4px;
            font-size: 12px;
            color: #3b82f6;
        }
        
        /* 배송 상태 표시 스타일 (입력창과 결과 패널 사이에 위치) */
        .shipping-status-box {
            margin-top: 25px;
            margin-bottom: 15px;
            padding: 14px;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 700;
            text-align: center;
            display: none; /* 초기 상태 숨김 */
        }
        .shipping-status-box.playable {
            display: block;
            background-color: #f0f9ff;
            border: 1px solid #bae6fd;
            color: #0284c7; /* 밝은 파란색 */
        }
        .shipping-status-box.unplayable {
            display: block;
            background-color: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626; /* 빨간색 경고 */
        }
        
        /* 결과 패널 디자인 */
        .result-panel {
            padding: 22px;
            background-color: #f8fafc;
            border-radius: 12px;
            border: 2px solid #e2e8f0;
        }
        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
        }
        .result-row.total {
            border-top: 1px dashed #cbd5e1;
            margin-top: 10px;
            padding-top: 15px;
        }
        .result-label {
            font-size: 14px;
            color: #475569;
            font-weight: 500;
        }
        .result-value {
            font-size: 18px;
            font-weight: 700;
            color: #1e293b;
        }
        .store-qty-highlight {
            font-size: 24px;
            color: #22c55e;
            font-weight: 800;
        }
        .final-price-highlight {
            font-size: 20px;
            color: #ef4444;
            font-weight: 700;
        }

        /* 쇼핑몰 주문 방법 안내 가이드 */
        .store-guide-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #f0fdf4;
            border: 1px solid #bbf7d0;
            border-radius: 10px;
            font-size: 13px;
            color: #166534;
            line-height: 1.6;
        }
        .store-guide-box ol {
            margin: 5px 0 0 0;
            padding-left: 20px;
        }
        .store-guide-box li {
            margin-bottom: 4px;
        }
    </style>
</head>
<body>

<div class="acrylic-calculator-container">
    <h3>아크릴 재단 자동 계산기</h3>
    <div class="sub-title">사이즈를 입력하시면 쇼핑몰 주문 수량이 계산됩니다.</div>
    
    <div class="calc-row">
        <label>아크릴 두께 선택</label>
        <div class="input-box-wrapper">
            <select id="acrylic-t" onchange="runCalculation()">
                <option value="2T" selected>2T (2mm)</option>
                <option value="3T">3T (3mm)</option>
                <option value="5T">5T (5mm)</option>
                <option value="8T">8T (8mm)</option>
                <option value="10T">10T (10mm)</option>
                <option value="15T">15T (15mm)</option>
                <option value="20T">20T (20mm)</option>
            </select>
        </div>
    </div>

    <div class="calc-row">
        <label>가로 사이즈</label>
        <div class="input-box-wrapper">
            <input type="number" id="size-w" placeholder="최대 90" min="0" max="90" oninput="handleInputRestriction(this)">
            <span class="unit-text">cm</span>
        </div>
        <div class="guide-text" id="guide-w">→ 가로를 입력해주세요.</div>
    </div>

    <div class="calc-row">
        <label>세로 사이즈</label>
        <div class="input-box-wrapper">
            <input type="number" id="size-h" placeholder="최대 90" min="0" max="90" oninput="handleInputRestriction(this)">
            <span class="unit-text">cm</span>
        </div>
        <div class="guide-text" id="guide-h">→ 세로를 입력해주세요.</div>
    </div>

    <div class="calc-row">
        <label>주문 수량 (판수)</label>
        <div class="input-box-wrapper">
            <input type="number" id="item-qty" placeholder="수량 입력" min="0" oninput="runCalculation()">
            <span class="unit-text">장</span>
        </div>
    </div>

    <div id="shipping-status" class="shipping-status-box"></div>

    <div class="result-panel">
        <div class="result-row">
            <div class="result-label">1장당 단가</div>
            <div class="result-value"><span id="unit-price-text">0</span>원</div>
        </div>
        <div class="result-row">
            <div class="result-label">총 예상 금액</div>
            <div class="result-value final-price-highlight"><span id="computed-total">0</span>원</div>
        </div>
        <div class="result-row total">
            <div class="result-label">쇼핑몰 <br><strong>[구매 수량] 입력값</strong></div>
            <div class="result-value store-qty-highlight"><span id="store-qty">0</span> 개</div>
        </div>
    </div>

    <div class="store-guide-box">
        🔒 <strong>쇼핑몰 주문 방법:</strong>
        <ol>
            <li>위의 녹색 박스에 표시된 <strong><span id="guide-qty-text">0</span></strong> 개를 복사합니다.</li>
            <li>쇼핑몰 결제창의 <strong>[수량]</strong> 칸에 그대로 입력합니다.</li>
            <li>배송 요청사항이나 텍스트 옵션 칸에 <br><strong style="color:#059669;">[ 두께 / 가로cm x 세로cm / 총 장수 ]</strong>를 적고 장바구니에 담아주세요!</li>
        </ol>
    </div>
</div>

function ceilTo5(value) {
    if (value <= 0) return 0;
    return Math.ceil(value / 5) * 5;
}

// 사용자의 직접적인 타이핑 입력을 최대 90으로 강제 바인딩하는 함수
function handleInputRestriction(inputElement) {
    let val = parseFloat(inputElement.value);
    if (!isNaN(val) && val > 90) {
        inputElement.value = 90; // 90 초과 입력 시 즉시 90으로 복원
    }
    runCalculation(); // 입력이 바뀔 때마다 실시간 계산 실행
}

function runCalculation() {
    const selectedT = document.getElementById('acrylic-t').value;
    const statusBox = document.getElementById('shipping-status');
    
    let rawW = parseFloat(document.getElementById('size-w').value);
    let rawH = parseFloat(document.getElementById('size-h').value);
    let qty = parseInt(document.getElementById('item-qty').value);

    // [중요 수정] 가로 세로 둘 다 숫자가 들어온 순간 합산 크기 조건부터 최우선 체크
    if (!isNaN(rawW) && !isNaN(rawH)) {
        const sizeSum = rawW + rawH;
        
        if (sizeSum > 150) {
            // 1. 150cm 초과 시 즉시 경고 박스 출력 및 예외 필터링
            statusBox.innerText = `🚨 배송 불가 사이즈 (가로+세로 합: ${sizeSum}cm / 150cm 초과)`;
            statusBox.className = "shipping-status-box unplayable";
            
            // 2. 단가와 금액 영역 강제 '-' 마스킹
            document.getElementById('guide-w').innerText = `→ 가로+세로 150cm를 초과했습니다.`;
            document.getElementById('guide-h').innerText = `→ 화물 배송 또는 수령 방식을 문의하세요.`;
            document.getElementById('unit-price-text').innerText = "- ";
            document.getElementById('computed-total').innerText = "- ";
            document.getElementById('store-qty').innerText = "0";
            document.getElementById('guide-qty-text').innerText = "0";
            return; // 이후 계산 진행 안 하고 즉시 중단
        } else {
            // 150cm 이하일 경우 정상 안내 출력
            statusBox.innerText = `🔹 택배 배송 가능 사이즈 (가로+세로 합: ${sizeSum}cm)`;
            statusBox.className = "shipping-status-box playable";
        }
    } else {
        // 어느 한쪽이라도 입력 값이 누락되었다면 경고창 숨김
        statusBox.style.display = 'none';
        statusBox.className = "shipping-status-box";
    }

    // 입력값이 불완전할 때 가이드 텍스트 및 기본값 리셋 처리
    if (isNaN(rawW) || rawW <= 0 || isNaN(rawH) || rawH <= 0) {
        document.getElementById('guide-w').innerText = isNaN(rawW) ? `→ 가로를 입력해주세요.` : `→ 계산 기준: ${ceilTo5(rawW)} cm 적용`;
        document.getElementById('guide-h').innerText = isNaN(rawH) ? `→ 세로를 입력해주세요.` : `→ 계산 기준: ${ceilTo5(rawH)} cm 적용`;
        
        document.getElementById('unit-price-text').innerText = "0";
        document.getElementById('computed-total').innerText = "0";
        document.getElementById('store-qty').innerText = "0";
        document.getElementById('guide-qty-text').innerText = "0";
        return;
    }

    // 올림(5단위) 보정 처리
    const roundedW = ceilTo5(rawW);
    const roundedH = ceilTo5(rawH);

    document.getElementById('guide-w').innerText = `→ 계산 기준: ${roundedW} cm 적용`;
    document.getElementById('guide-h').innerText = `→ 계산 기준: ${roundedH} cm 적용`;

    // 수량 유효성 검사
    if (isNaN(qty) || qty <= 0) {
        qty = 0;
    }

    // 단가 테이블 매핑 구동
    let unitPrice = 0;
    const tTable = priceTable[selectedT];
    
    if (tTable && tTable[roundedW] && tTable[roundedW][roundedH]) {
        unitPrice = tTable[roundedW][roundedH];
    } else if (tTable && tTable[roundedH] && tTable[roundedH][roundedW]) {
        unitPrice = tTable[roundedH][roundedW];
    }

    // 정상 출력 영역 세팅
    document.getElementById('unit-price-text').innerText = unitPrice.toLocaleString();

    const totalPrice = unitPrice * qty;
    document.getElementById('computed-total').innerText = totalPrice.toLocaleString();

    // 쇼핑몰 연동 수량 계산 (100원당 1개)
    const storeQuantity = totalPrice / 100;
    document.getElementById('store-qty').innerText = storeQuantity.toLocaleString();
    document.getElementById('guide-qty-text').innerText = storeQuantity.toLocaleString();
}

// 초기 로드시 인풋 빈칸 세팅
window.onload = function() {
    document.getElementById('size-w').value = "";
    document.getElementById('size-h').value = "";
    document.getElementById('item-qty').value = "";
};
